<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyNotes Pro - Desktop</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&family=Roboto+Mono&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0c10; }
        .font-serif { font-family: 'Merriweather', serif; }
        
        .lines-bg {
            background-image: linear-gradient(transparent 31px, #e5e7eb 32px);
            background-size: 100% 32px;
        }

        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes rotate-gear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-gear { animation: rotate-gear 3s linear infinite; }

        .editor-content { min-height: 100%; outline: none; position: relative; z-index: 1; }
        .drawing-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 2; }
        .drawing-canvas.active { pointer-events: auto; cursor: crosshair; }
        
        .toolbar-btn { @apply p-2 hover:bg-gray-200 rounded text-gray-600 transition-colors flex items-center justify-center; }
        .toolbar-select { @apply bg-transparent border-none text-xs font-bold text-gray-600 outline-none cursor-pointer hover:text-black; }
        
        .color-btn.ring-offset-2 { ring-offset-color: #1a1d24; }
    </style>
</head>
<body class="text-gray-100 h-screen flex overflow-hidden relative">

    <!-- ECRÃ DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[100000] flex items-center justify-center bg-[#0a0c10] transition-opacity duration-500">
        <div class="bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-xl shadow-2xl w-[400px] flex flex-col items-center">
            <div class="w-20 h-20 bg-[#3E5A7A] rounded-2xl flex items-center justify-center shadow-lg text-4xl font-bold font-serif text-white mb-6">MN</div>
            <h1 class="text-3xl font-light text-white mb-2">My<span class="font-bold text-[#3E5A7A] font-serif">Notes</span></h1>
            <p class="text-slate-400 text-sm mb-6">Escrita criativa e organizada.</p>
            <button type="button" onclick="window.showGoogleSelector()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-800 font-bold py-3 rounded-xl hover:bg-gray-200 transition-all active:scale-95 shadow-md">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Entrar com o Google
            </button>
        </div>
    </div>

    <!-- SELETOR DE CONTAS GOOGLE -->
    <div id="google-selector-modal" class="hidden fixed inset-0 z-[100001] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div class="p-6 text-center border-b">
                <h2 class="text-xl font-bold text-gray-900">Escolha uma conta</h2>
            </div>
            <div id="google-accounts-list" class="max-h-[300px] overflow-y-auto bg-gray-50"></div>
            <div class="p-4 bg-white border-t flex flex-col gap-2">
                <button onclick="window.useNewGoogleAccount()" class="w-full text-left p-3 hover:bg-gray-100 rounded-xl transition-colors flex items-center gap-3 text-sm font-medium text-gray-700">
                    <i data-lucide="user-plus" width="18"></i> Adicionar outra conta
                </button>
                <button onclick="window.hideGoogleSelector()" class="w-full p-2 text-xs text-gray-400 font-bold uppercase hover:text-gray-600">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE CRIAÇÃO -->
    <div id="create-modal" class="hidden fixed inset-0 z-[100002] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 opacity-0 scale-95 transition-all duration-300">
        <div class="bg-[#1a1d24] border border-white/10 rounded-2xl p-8 w-[420px] shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-2">
                <h2 class="text-white font-bold">Criar Caderneta</h2>
                <button onclick="window.closeCreateModal()" class="text-gray-500 hover:text-white"><i data-lucide="x" width="20"></i></button>
            </div>
            <div class="flex flex-col gap-4">
                <input type="text" id="new-note-title" placeholder="Título da Caderneta" class="bg-black/50 border border-white/10 rounded-lg p-3 text-white text-sm outline-none focus:border-[#3E5A7A]">
                <input type="text" id="new-note-subtitle" placeholder="Subtítulo ou Descrição" class="bg-black/50 border border-white/10 rounded-lg p-3 text-white text-sm outline-none focus:border-[#3E5A7A]">
                <div class="flex flex-col gap-1 mt-2">
                    <label class="text-[10px] uppercase font-bold text-gray-400">Prateleira de Destino</label>
                    <select id="new-note-category" class="bg-black/50 border border-white/10 rounded-lg p-3 text-white text-sm outline-none focus:border-[#3E5A7A]"></select>
                </div>
                <div class="flex flex-col gap-1 mt-2">
                    <label class="text-[10px] uppercase font-bold text-gray-400 mb-1">Cor da Capa</label>
                    <div class="flex gap-3 justify-center">
                        <button type="button" onclick="window.selectColor('bg-[#3E5A7A]')" class="w-8 h-8 rounded-full bg-[#3E5A7A] border-2 border-white ring-2 ring-transparent ring-offset-2 focus:outline-none color-btn transition-all"></button>
                        <button type="button" onclick="window.selectColor('bg-[#2A363B]')" class="w-8 h-8 rounded-full bg-[#2A363B] border-2 border-transparent ring-2 ring-transparent ring-offset-2 focus:outline-none color-btn transition-all"></button>
                        <button type="button" onclick="window.selectColor('bg-[#4A5D23]')" class="w-8 h-8 rounded-full bg-[#4A5D23] border-2 border-transparent ring-2 ring-transparent ring-offset-2 focus:outline-none color-btn transition-all"></button>
                        <button type="button" onclick="window.selectColor('bg-[#8B4513]')" class="w-8 h-8 rounded-full bg-[#8B4513] border-2 border-transparent ring-2 ring-transparent ring-offset-2 focus:outline-none color-btn transition-all"></button>
                        <button type="button" onclick="window.selectColor('bg-[#5f6368]')" class="w-8 h-8 rounded-full bg-[#5f6368] border-2 border-transparent ring-2 ring-transparent ring-offset-2 focus:outline-none color-btn transition-all"></button>
                    </div>
                </div>
                <button onclick="window.submitCreateNote()" class="mt-4 py-3 rounded-lg bg-[#3E5A7A] text-white hover:bg-[#2b4058] text-sm font-bold transition-all shadow-lg active:scale-95">Criar Caderno</button>
            </div>
        </div>
    </div>

    <!-- BARRA LATERAL -->
    <aside class="w-24 h-full bg-black/50 border-r border-white/5 flex flex-col items-center py-6 shrink-0 relative z-[500]">
        <div class="relative flex flex-col items-center w-full px-2 mb-4">
            <button onclick="window.toggleUserMenu(event)" id="account-btn" class="w-12 h-12 bg-slate-800 rounded-full flex items-center justify-center border-2 border-[#3E5A7A] shadow-lg hover:scale-110 transition-transform">
                <i data-lucide="user" class="text-white" width="20"></i>
            </button>
            <span class="text-[9px] font-bold uppercase tracking-wider mt-2 text-slate-400">Conta</span>
            
            <div id="user-dropdown" class="hidden absolute top-0 left-24 bg-[#0a0c10] border border-[#3E5A7A]/40 rounded-2xl p-5 w-72 z-[1000] opacity-0 scale-95 transition-all duration-200 origin-top-left backdrop-blur-3xl">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-[#3E5A7A]/20 rounded-full flex items-center justify-center shrink-0"><i data-lucide="user" class="text-[#3E5A7A]" width="18"></i></div>
                    <div class="overflow-hidden">
                        <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Ativo</p>
                        <p class="text-sm font-bold text-white truncate" id="display-user-email">...</p>
                    </div>
                </div>
                <button onclick="window.performLogout()" class="w-full flex items-center gap-3 text-red-400 hover:bg-red-500/10 p-3 rounded-xl transition-all text-xs font-bold"><i data-lucide="log-out" width="14"></i> Sair de Tudo</button>
            </div>
        </div>
        <div class="w-10 h-px bg-white/10 mb-4 shrink-0"></div>
        <nav class="flex-1 flex flex-col gap-3 w-full items-center overflow-y-auto hide-scrollbar" id="nav-categories"></nav>
    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-800/20 via-[#0a0c10] to-[#0a0c10]">
        
        <header id="main-header" class="px-12 py-10 flex justify-between items-start z-10 shrink-0 relative">
            <div>
                <h1 class="text-4xl font-light text-white mb-2">My<span class="font-bold text-[#3E5A7A] font-serif">Notes</span></h1>
                <p class="text-slate-500 text-sm tracking-widest uppercase font-semibold" id="header-stats">Estante</p>
            </div>
            <div class="flex gap-4 items-center">
                <div class="relative group h-[42px]">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" width="16"></i>
                    <input type="text" id="search-input" oninput="window.updateSearch(this.value)" placeholder="Pesquisar..." class="h-full bg-black/40 border border-white/10 rounded-full pl-12 pr-10 text-sm text-gray-200 outline-none focus:border-[#3E5A7A] w-48 md:w-64 transition-colors">
                </div>
            </div>
        </header>

        <section id="notebooks-container" class="flex-1 overflow-y-auto pb-32 pt-4 z-10 w-full scroll-smooth relative px-12"></section>

        <!-- Botão Adição -->
        <button onclick="window.openCreateModal()" class="fixed bottom-10 right-10 w-16 h-16 bg-[#3E5A7A] text-white rounded-full flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-2xl z-[900]">
            <i data-lucide="plus" width="32"></i>
        </button>
    </main>

    <!-- Firebase SDKs & Script Principal -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy3z41u8lOC8lYAvASDry21bnjRlGuCFw",
            authDomain: "mynotes-7b624.firebaseapp.com",
            projectId: "mynotes-7b624",
            storageBucket: "mynotes-7b624.firebasestorage.app",
            messagingSenderId: "413142009296",
            appId: "1:413142009296:web:fb1fed761c1170ca5ce5d5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.state = {
            notebooks: [], category: 'Todas', search: '', userEmail: '', isAuthenticated: false,
            loggedAccounts: ['gvconecta2025@gmail.com'],
            shelfNames: { 'Geral': 'Geral', 'Senhas': 'Senhas', 'Códigos': 'Códigos', 'Estudos': 'Estudos', 'Pessoal': 'Pessoal' },
            newNoteColor: 'bg-[#3E5A7A]',
            isDrawing: false,
            penColor: '#000000',
            penSize: 2,
            expandedNoteId: null
        };

        // --- AUTH ---
        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => { if (user && window.state.isAuthenticated) loadNotebooks(); });

        window.showGoogleSelector = () => {
            const modal = document.getElementById('google-selector-modal');
            modal.classList.remove('hidden');
            document.getElementById('google-accounts-list').innerHTML = window.state.loggedAccounts.map(a => `
                <button onclick="window.selectAccount('${a}')" class="w-full flex items-center gap-4 p-4 hover:bg-gray-100 transition-colors border-b">
                    <div class="w-10 h-10 rounded-full bg-[#3E5A7A]/10 text-[#3E5A7A] flex items-center justify-center font-bold">${a[0].toUpperCase()}</div>
                    <div class="text-left overflow-hidden">
                        <p class="text-sm font-bold text-gray-900 truncate">${a.split('@')[0]}</p>
                    </div>
                </button>
            `).join('');
        };

        window.hideGoogleSelector = () => document.getElementById('google-selector-modal').classList.add('hidden');

        window.selectAccount = (email) => {
            window.state.userEmail = email;
            window.state.isAuthenticated = true;
            window.hideGoogleSelector();
            document.getElementById('login-screen').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('display-user-email').innerText = email;
            loadNotebooks();
        };

        window.useNewGoogleAccount = () => {
            const email = prompt("E-mail da Nova Conta:");
            if(email && email.includes('@')) {
                if(!window.state.loggedAccounts.includes(email)) window.state.loggedAccounts.push(email);
                window.selectAccount(email);
            }
        };

        window.performLogout = () => location.reload();
        window.toggleUserMenu = (e) => {
            if(e) e.stopPropagation();
            const d = document.getElementById('user-dropdown');
            if(!d.classList.contains('hidden')) {
                d.classList.add('opacity-0', 'scale-95'); setTimeout(() => d.classList.add('hidden'), 200);
            } else {
                d.classList.remove('hidden'); 
                setTimeout(() => d.classList.remove('opacity-0', 'scale-95'), 10);
            }
        };

        // --- DADOS ---
        const normalize = (s) => (s || '').normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        function loadNotebooks() {
            const slug = normalize(window.state.userEmail).replace(/[^a-z0-9]/g, "_");
            onSnapshot(collection(db, 'artifacts', 'mynotes-app', 'users', slug, 'notebooks'), (snap) => {
                const loaded = []; 
                snap.forEach(d => loaded.push({ id: d.id, ...d.data(), isOpen: false, currentPage: 0 }));
                
                window.state.notebooks = loaded.map(n => {
                    const ex = window.state.notebooks.find(x => x.id === n.id);
                    return ex ? { ...n, isOpen: ex.isOpen, currentPage: ex.currentPage } : n;
                });
                window.renderApp();
            });
        }

        window.saveNoteData = async (id) => {
            const n = window.state.notebooks.find(x => x.id === id);
            if (!n) return;
            const slug = normalize(window.state.userEmail).replace(/[^a-z0-9]/g, "_");
            try {
                await updateDoc(doc(db, 'artifacts', 'mynotes-app', 'users', slug, 'notebooks', id), { 
                    pages: n.pages, title: n.title, subtitle: n.subtitle, drawingData: n.drawingData || []
                });
            } catch (e) { console.error("Erro ao salvar:", e); }
        };

        // --- DRAWING LOGIC (CANETA DIGITAL COM CALIBRAÇÃO) ---
        window.initCanvas = (id) => {
            const canvas = document.getElementById(`canvas-${id}`);
            const editorDiv = document.getElementById(`editor-${id}`);
            if (!canvas || !editorDiv) return;

            const ctx = canvas.getContext('2d');
            let drawing = false;

            const calibrateCanvas = () => {
                const rect = editorDiv.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = `${rect.width}px`;
                canvas.style.height = `${rect.height}px`;
                ctx.scale(dpr, dpr);
            };

            calibrateCanvas();

            const start = (e) => {
                if (!window.state.isDrawing) return;
                drawing = true;
                ctx.beginPath();
                const rect = canvas.getBoundingClientRect();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            };

            const draw = (e) => {
                if (!drawing || !window.state.isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.strokeStyle = window.state.penColor;
                ctx.lineWidth = window.state.penSize;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.stroke();
            };

            const stop = () => {
                if (drawing) {
                    drawing = false;
                    const n = window.state.notebooks.find(x => x.id === id);
                    if (!n.drawingData) n.drawingData = [];
                    // Salva compressão WebP para evitar limite do Firestore
                    n.drawingData[n.currentPage] = canvas.toDataURL('image/webp', 0.5);
                    window.saveNoteData(id);
                }
            };

            canvas.onmousedown = start;
            canvas.onmousemove = draw;
            canvas.onmouseup = stop;
            canvas.onmouseleave = stop;

            const n = window.state.notebooks.find(x => x.id === id);
            if (n.drawingData && n.drawingData[n.currentPage]) {
                const img = new Image();
                img.onload = () => {
                     ctx.clearRect(0, 0, canvas.width, canvas.height); 
                     ctx.drawImage(img, 0, 0, canvas.width / (window.devicePixelRatio||1), canvas.height / (window.devicePixelRatio||1));
                };
                img.src = n.drawingData[n.currentPage];
            }
        };

        window.togglePen = (id) => {
            window.state.isDrawing = !window.state.isDrawing;
            const canvas = document.getElementById(`canvas-${id}`);
            canvas.classList.toggle('active', window.state.isDrawing);
            document.getElementById(`pen-btn-${id}`).classList.toggle('bg-blue-100', window.state.isDrawing);
        };

        // --- FORMATTING LOGIC ---
        window.exec = (cmd, val = null) => { document.execCommand(cmd, false, val); };
        window.updateNoteData = (id, html) => { window.state.notebooks.find(x => x.id === id).pages[window.state.notebooks.find(x=>x.id===id).currentPage] = html; };

        // --- CRIAÇÃO DE NOTAS ---
        window.openCreateModal = () => {
            const modal = document.getElementById('create-modal');
            const sel = document.getElementById('new-note-category');
            sel.innerHTML = Object.keys(window.state.shelfNames).map(k => `<option value="${k}">${window.state.shelfNames[k]}</option>`).join('');
            sel.value = window.state.category === 'Todas' ? 'Geral' : window.state.category;
            
            document.getElementById('new-note-title').value = '';
            document.getElementById('new-note-subtitle').value = '';
            window.selectColor('bg-[#3E5A7A]');
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0', 'scale-95'), 10);
        };

        window.closeCreateModal = () => {
            const modal = document.getElementById('create-modal');
            modal.classList.add('opacity-0', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        window.selectColor = (col) => {
            window.state.newNoteColor = col;
            document.querySelectorAll('.color-btn').forEach(btn => {
                if(btn.getAttribute('onclick').includes(col)) btn.classList.replace('border-transparent', 'border-white');
                else btn.classList.replace('border-white', 'border-transparent');
            });
        };

        window.submitCreateNote = async () => {
            const title = document.getElementById('new-note-title').value || 'Nova Caderneta';
            const subtitle = document.getElementById('new-note-subtitle').value || 'Descritivo';
            const cat = document.getElementById('new-note-category').value;
            const color = window.state.newNoteColor;
            
            const slug = normalize(window.state.userEmail).replace(/[^a-z0-9]/g, "_");
            await addDoc(collection(db, 'artifacts', 'mynotes-app', 'users', slug, 'notebooks'), { 
                title: title, subtitle: subtitle, date: new Date().toLocaleDateString('pt-BR'), category: cat, color: color, showLines: true, pages: [''], drawingData: []
            });
            window.closeCreateModal();
        };

        // --- WINDOW CONTROLS ---
        window.openNote = (id) => { window.state.notebooks.find(x => x.id === id).isOpen = true; window.renderApp(); };
        window.closeNote = async (id) => { 
            await window.saveNoteData(id);
            const n = window.state.notebooks.find(x => x.id === id);
            n.isOpen = false; 
            window.state.isDrawing = false;
            if (window.state.expandedNoteId === id) window.state.expandedNoteId = null;
            window.renderApp(); 
        };
        window.toggleMaximize = (id) => { 
            window.state.expandedNoteId = (window.state.expandedNoteId === id) ? null : id; 
            window.renderApp(); 
        };

        // --- EXPORT TO DESKTOP ---
        window.exportToDesktop = async (id) => {
            const note = window.state.notebooks.find(x => x.id === id);
            if (!note) return;

            const fileContent = `
            <!DOCTYPE html>
            <html lang="pt-BR">
            <head>
                <meta charset="UTF-8">
                <title>${note.title}</title>
                <style>
                    body { font-family: 'Inter', sans-serif; max-width: 800px; margin: 40px auto; color: #333; line-height: 1.6; }
                    h1 { color: #3E5A7A; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom:0;}
                    p { margin-top: 5px; color: #666; font-size: 14px;}
                    .page { margin-bottom: 40px; padding: 40px; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eaeaea; min-height: 500px;}
                </style>
            </head>
            <body style="background-color: #f5f5f5;">
                <h1>${note.title}</h1>
                <p><em>${note.subtitle} - Exportado em ${new Date().toLocaleDateString()}</em></p>
                ${note.pages.map((pageHtml, index) => `
                    <div class="page">
                        <div style="font-size:10px; color:#ccc; text-align:right; margin-bottom: 20px; border-bottom:1px solid #eee; padding-bottom:5px;">Página ${index + 1}</div>
                        ${pageHtml}
                    </div>
                `).join('')}
            </body>
            </html>`;

            const suggestedFileName = `${note.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.html`;

            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: suggestedFileName,
                        types: [{ description: 'Documento MyNotes', accept: { 'text/html': ['.html'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(fileContent);
                    await writable.close();
                } else {
                    const blob = new Blob([fileContent], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = suggestedFileName;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            } catch (err) {
                if (err.name !== 'AbortError') alert("Erro ao exportar o arquivo.");
            }
        };

        // --- RENDER APP ---
        window.renderApp = () => {
            if(!window.state.isAuthenticated) return;
            const container = document.getElementById('notebooks-container');
            const term = normalize(window.state.search);
            const filtered = window.state.notebooks.filter(n => !term || normalize(n.title).includes(term) || normalize(n.subtitle).includes(term));

            // Setup Categories Sidebar
            const cats = ['Todas', ...Object.keys(window.state.shelfNames)];
            document.getElementById('nav-categories').innerHTML = cats.map(cat => `
                <button onclick="window.state.category='${cat}'; window.renderApp();" 
                        class="flex flex-col items-center justify-center w-[72px] py-3 rounded-xl transition-all ${window.state.category === cat ? 'bg-white/10 text-white shadow-md' : 'text-gray-500 hover:text-white hover:bg-white/5'}">
                    <i data-lucide="${cat==='Todas'?'folder-open':cat==='Senhas'?'key':cat==='Códigos'?'code-2':cat==='Estudos'?'book-open':cat==='Pessoal'?'user':'layout-grid'}" width="22"></i>
                    <span class="text-[9px] font-bold uppercase tracking-wider mt-2 text-center leading-tight">${cat}</span>
                </button>
            `).join('');

            document.getElementById('header-stats').innerText = `${window.state.notebooks.length} Cadernos Encontrados`;

            // Render Notebooks
            container.innerHTML = `<div class="flex flex-wrap gap-8">` + filtered.map(n => {
                if (window.state.category !== 'Todas' && n.category !== window.state.category) return '';

                if (!n.isOpen) {
                    return `
                        <div onclick="window.openNote('${n.id}')" class="relative w-64 h-80 flex-shrink-0 transition-all duration-300 hover:scale-[1.05] cursor-pointer group">
                            <div class="w-full h-full ${n.color || 'bg-[#3E5A7A]'} rounded-r-2xl shadow-2xl border-l-2 border-black/30 relative overflow-hidden flex justify-end">
                                <div class="w-[65%] h-full bg-[#fdfbf7] flex flex-col items-center py-10 px-4 text-center z-10 transition-colors group-hover:bg-white">
                                    <h2 class="text-lg text-slate-800 font-sans font-black uppercase tracking-widest border-b-2 border-slate-200 pb-3 mb-3 w-full break-words">${n.title}</h2>
                                    <p class="text-slate-500 text-[10px] uppercase font-semibold break-words">${n.subtitle}</p>
                                    <div class="mt-auto text-[8px] text-slate-400 uppercase tracking-tighter">${n.date}</div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                const isMax = window.state.expandedNoteId === n.id;
                return `
                    <div class="${isMax?'fixed inset-0 z-[2000] bg-black/90 p-10':'relative w-full mb-10'} flex items-center justify-center transition-all duration-500">
                        <div class="${isMax?'w-full h-full max-w-6xl':'w-full h-[600px]'} bg-[#fdfbf7] rounded-xl flex flex-col overflow-hidden shadow-[0_30px_60px_rgba(0,0,0,0.5)] border border-gray-400">
                            
                            <!-- PAINEL DE FORMATAÇÃO COMPLETO -->
                            <div class="bg-gray-100 border-b p-2 flex flex-wrap gap-2 items-center shadow-sm shrink-0">
                                <select onchange="window.exec('fontName', this.value)" class="toolbar-select w-32">
                                    <option value="Inter">Inter</option>
                                    <option value="Merriweather">Merriweather</option>
                                    <option value="Playfair Display">Elegante</option>
                                    <option value="Roboto Mono">Código</option>
                                </select>
                                
                                <select onchange="window.exec('fontSize', this.value)" class="toolbar-select w-12">
                                    <option value="3">12</option><option value="4">14</option><option value="5">18</option><option value="6">24</option><option value="7">32</option>
                                </select>

                                <div class="w-px h-6 bg-gray-300 mx-1"></div>

                                <button onclick="window.exec('bold')" class="toolbar-btn" title="Negrito"><i data-lucide="bold" width="16"></i></button>
                                <button onclick="window.exec('italic')" class="toolbar-btn" title="Itálico"><i data-lucide="italic" width="16"></i></button>
                                <button onclick="window.exec('underline')" class="toolbar-btn" title="Sublinhado"><i data-lucide="underline" width="16"></i></button>
                                <button onclick="window.exec('strikeThrough')" class="toolbar-btn" title="Riscado"><i data-lucide="type" width="16"></i></button>

                                <div class="w-px h-6 bg-gray-300 mx-1"></div>

                                <button onclick="window.exec('justifyLeft')" class="toolbar-btn"><i data-lucide="align-left" width="16"></i></button>
                                <button onclick="window.exec('justifyCenter')" class="toolbar-btn"><i data-lucide="align-center" width="16"></i></button>
                                
                                <div class="w-px h-6 bg-gray-300 mx-1"></div>

                                <input type="color" onchange="window.exec('foreColor', this.value)" class="w-6 h-6 border-none cursor-pointer" title="Cor do Texto">
                                <button onclick="window.exec('insertUnorderedList')" class="toolbar-btn"><i data-lucide="list" width="16"></i></button>

                                <!-- SUPORTE A CANETA DIGITAL E CONTROLES -->
                                <div class="ml-auto flex gap-1 items-center mr-2">
                                    <button onclick="window.exportToDesktop('${n.id}')" class="toolbar-btn text-emerald-600 hover:bg-emerald-100" title="Salvar no PC">
                                        <i data-lucide="download" width="16"></i>
                                    </button>
                                    <div class="w-px h-6 bg-gray-300 mx-1"></div>
                                    <button id="pen-btn-${n.id}" onclick="window.togglePen('${n.id}')" class="toolbar-btn border border-blue-200" title="Usar Caneta Digital">
                                        <i data-lucide="pen-tool" width="16" class="text-blue-600"></i>
                                    </button>
                                    <input type="color" onchange="window.state.penColor = this.value" class="w-6 h-6 rounded-full overflow-hidden border-none" title="Cor da Caneta" value="#000000">
                                    <div class="w-px h-6 bg-gray-300 mx-1"></div>
                                    <button onclick="event.stopPropagation(); window.closeNote('${n.id}')" class="w-8 h-8 flex items-center justify-center hover:bg-gray-300 text-gray-600 rounded transition-colors"><i data-lucide="minus" width="14"></i></button>
                                    <button onclick="event.stopPropagation(); window.toggleMaximize('${n.id}')" class="w-8 h-8 flex items-center justify-center hover:bg-gray-300 text-gray-600 rounded transition-colors"><i data-lucide="${isMax?'copy':'square'}" width="14"></i></button>
                                    <button onclick="event.stopPropagation(); window.closeNote('${n.id}')" class="w-8 h-8 flex items-center justify-center hover:bg-red-500 hover:text-white text-gray-600 rounded transition-colors"><i data-lucide="x" width="14"></i></button>
                                </div>
                            </div>

                            <!-- ÁREA DE ESCRITA + CANVAS -->
                            <div class="flex-1 relative overflow-auto custom-scroll bg-white">
                                <canvas id="canvas-${n.id}" class="drawing-canvas"></canvas>
                                <div id="editor-${n.id}" contenteditable="true" 
                                     oninput="window.updateNoteData('${n.id}', this.innerHTML)" 
                                     onblur="window.saveNoteData('${n.id}')"
                                     class="editor-content p-16 text-slate-800 lines-bg leading-[32px] min-h-full"
                                     spellcheck="false">
                                    ${n.pages[n.currentPage] || ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('') + `</div>`;
            
            lucide.createIcons();
            
            // Re-inicializa canvases para as notas abertas após o render renderizar o DOM
            window.state.notebooks.forEach(n => { 
                if(n.isOpen) {
                    setTimeout(() => window.initCanvas(n.id), 50); // delay pequeno para garantir que o DOM renderizou
                }
            });
        };

        window.updateSearch = (v) => { window.state.search = v; window.renderApp(); };
        
        document.addEventListener('click', (e) => {
            const ab = document.getElementById('account-btn'), ud = document.getElementById('user-dropdown');
            if(ab && ud && !ab.contains(e.target) && !ud.contains(e.target)) {
                ud.classList.add('opacity-0', 'scale-95'); setTimeout(() => ud.classList.add('hidden'), 200);
            }
        });

    </script>
</body>
</html>
