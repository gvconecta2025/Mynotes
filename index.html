<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyNotes - Webapp</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        
        .lines-bg {
            background-image: linear-gradient(transparent 31px, #e5e7eb 32px);
            background-size: 100% 32px;
        }
        
        /* Scrollbars customizadas */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.2); }

        /* Ocultar scrollbar nas prateleiras estilo Netflix */
        .hide-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-[#0a0c10] text-gray-100 min-h-screen flex overflow-hidden selection:bg-slate-700">

    <!-- BARRA LATERAL -->
    <aside class="w-20 bg-black/50 border-r border-white/5 flex flex-col items-center py-6 gap-8 flex-shrink-0 z-20">
        <div class="w-12 h-12 bg-[#3E5A7A] rounded-xl flex items-center justify-center shadow-lg cursor-pointer text-xl font-bold font-serif text-white">
            MN
        </div>
        
        <nav class="flex flex-col gap-4 w-full items-center" id="nav-categories">
            <!-- Botões injetados via JS -->
        </nav>

        <div class="mt-auto flex flex-col gap-4 items-center">
            <button onclick="window.togglePrivacy()" id="btn-privacy" class="p-3 rounded-xl transition-all text-emerald-500 bg-emerald-500/10 hover:bg-emerald-500/20" title="Ativar Escudo de Privacidade">
                <i data-lucide="shield-off" width="22" height="22"></i>
            </button>
            <button class="p-3 text-gray-500 hover:text-gray-300">
                <i data-lucide="settings" width="22" height="22"></i>
            </button>
        </div>
    </aside>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 flex flex-col relative overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-800/20 via-[#0a0c10] to-[#0a0c10]">
        
        <header class="px-12 py-10 flex justify-between items-start z-10 shrink-0">
            <div>
                <h1 class="text-4xl font-light tracking-tight text-white mb-2">
                    Meus <span class="font-bold text-[#3E5A7A] font-serif">Cadernos</span>
                </h1>
                <p class="text-slate-500 text-sm tracking-widest uppercase font-semibold" id="header-stats">
                    A Carregar...
                </p>
            </div>

            <div class="flex gap-6">
                <div class="relative group">
                    <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500">
                        <i data-lucide="search" width="16" height="16"></i>
                    </div>
                    <input 
                        type="text" 
                        id="search-input"
                        onkeyup="window.updateSearch(this.value)"
                        placeholder="Pesquisar..." 
                        class="bg-white/5 border border-white/10 rounded-full py-2.5 pl-12 pr-4 text-sm text-gray-200 outline-none focus:border-[#3E5A7A] transition-colors w-64"
                    />
                </div>

                <!-- Calendário Estático (Maio 2026) -->
                <div class="bg-white/5 border border-white/10 p-5 rounded-2xl w-72 backdrop-blur-sm">
                    <h3 class="text-[10px] uppercase tracking-widest text-[#3E5A7A] mb-4 text-center font-bold">Maio 2026</h3>
                    <div class="grid grid-cols-7 gap-y-3 gap-x-1 text-[11px] text-center font-medium" id="calendar-grid">
                        <span class="text-gray-600">D</span><span class="text-gray-600">S</span><span class="text-gray-600">T</span>
                        <span class="text-gray-600">Q</span><span class="text-gray-600">Q</span><span class="text-gray-600">S</span><span class="text-gray-600">S</span>
                        <!-- Dias injetados via JS -->
                    </div>
                </div>
            </div>
        </header>

        <!-- PALCO DAS CADERNETAS (Agora com scroll vertical para as prateleiras) -->
        <section id="notebooks-container" class="flex-1 overflow-y-auto pb-12 pt-4 z-10 w-full perspective-[1000px]">
            <!-- Prateleiras injetadas via JS -->
            <div class="text-gray-500 flex flex-col items-center justify-center w-full h-full mt-20">
               <i data-lucide="loader-2" class="animate-spin w-10 h-10 mb-4"></i>
               <p>A ligar à nuvem...</p>
            </div>
        </section>

    </main>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDy3z41u8lOC8lYAvASDry21bnjRlGuCFw",
            authDomain: "mynotes-7b624.firebaseapp.com",
            projectId: "mynotes-7b624",
            storageBucket: "mynotes-7b624.firebasestorage.app",
            messagingSenderId: "413142009296",
            appId: "1:413142009296:web:fb1fed761c1170ca5ce5d5",
            measurementId: "G-17Z7GJH69M"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ESTADO DO APLICATIVO ---
        window.state = {
            notebooks: [],
            category: 'Todas',
            search: '',
            privacyMode: false,
            userId: null
        };

        let unsubscribeSnapshot = null;

        // --- AUTENTICAÇÃO E CARREGAMENTO DE DADOS ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Usuário logado anonimamente:", user.uid);
                window.state.userId = user.uid;
                loadNotebooks();
            } else {
                signInAnonymously(auth).catch((error) => {
                    console.error("Falha na autenticação:", error);
                    document.getElementById('notebooks-container').innerHTML = `<p class="text-red-500">Erro de ligação ao Firebase.</p>`;
                });
            }
        });

        function loadNotebooks() {
             const appId = typeof __app_id !== 'undefined' ? __app_id : 'mynotes-app';
             const notesRef = collection(db, 'artifacts', appId, 'users', window.state.userId, 'notebooks');

             if(unsubscribeSnapshot) unsubscribeSnapshot();

             unsubscribeSnapshot = onSnapshot(notesRef, (snapshot) => {
                 const loadedNotes = [];
                 snapshot.forEach((doc) => {
                     loadedNotes.push({ id: doc.id, ...doc.data(), isOpen: false, currentPage: 0, isEditing: false });
                 });
                 
                 if(loadedNotes.length === 0){
                    seedInitialData(notesRef);
                 } else {
                     window.state.notebooks = loadedNotes.map(newNote => {
                         const existingNote = window.state.notebooks.find(n => n.id === newNote.id);
                         return existingNote ? { ...newNote, isOpen: existingNote.isOpen, currentPage: existingNote.currentPage, isEditing: existingNote.isEditing } : newNote;
                     });
                     renderApp();
                 }

             }, (error) => {
                 console.error("Erro ao carregar notas:", error);
             });
        }

        async function seedInitialData(notesRef) {
             const initialData = [
                {
                    title: 'Acessos & Senhas', subtitle: 'Criptografia Pessoal', date: '06/05/2026', tags: ['segurança', 'root'], category: 'Senhas', color: 'bg-[#3E5A7A]',
                    pages: ['Servidor Principal\nIP: 192.168.1.100\nUser: admin_master\nPass: **********\n\nBanco de Dados\nPorta: 5432\nPass: DB_secure_2026!', 'Contas Pessoais\n\nEmail: user@mynotes.com\nPass: **********']
                },
                {
                    title: 'Scripts Python', subtitle: 'Automação e Logs', date: '04/05/2026', tags: ['dev', 'python'], category: 'Códigos', color: 'bg-[#2A363B]',
                    pages: ['def backup_routine():\n    print("Iniciando backup...")\n    # Conectar ao S3\n    return True\n\nbackup_routine()']
                },
                {
                    title: 'Diário de Ideias', subtitle: 'Brainstorming Mensal', date: '01/05/2026', tags: ['pessoal', 'criativo'], category: 'Geral', color: 'bg-[#4A5D23]',
                    pages: ['Nova arquitetura visual para o projeto.\n\nFoco na memória espacial e na sensação de usar papel real no ambiente digital.']
                }
            ];

            for(const note of initialData){
                await addDoc(notesRef, note);
            }
        }

        // --- LÓGICA DE RENDERIZAÇÃO ---
        window.renderApp = function() {
            renderSidebar();
            renderHeader();
            renderCalendar();
            renderNotebooks();
            lucide.createIcons(); // Atualiza os ícones SVG
        }

        function renderSidebar() {
            const nav = document.getElementById('nav-categories');
            const categories = [
                { id: 'Todas', icon: 'folder' },
                { id: 'Senhas', icon: 'key' },
                { id: 'Códigos', icon: 'code-2' },
                { id: 'Geral', icon: 'layout-grid' }
            ];

            nav.innerHTML = categories.map(cat => `
                <button onclick="window.setCategory('${cat.id}')" class="p-3 rounded-xl transition-all ${window.state.category === cat.id ? 'bg-white/10 text-white' : 'text-gray-500 hover:text-gray-300'}" title="${cat.id}">
                    <i data-lucide="${cat.icon}" width="22" height="22"></i>
                </button>
            `).join('');

            const btnPrivacy = document.getElementById('btn-privacy');
            if (window.state.privacyMode) {
                btnPrivacy.className = 'p-3 rounded-xl transition-all bg-red-500/20 text-red-400';
                btnPrivacy.innerHTML = '<i data-lucide="shield" width="22" height="22"></i>';
            } else {
                btnPrivacy.className = 'p-3 rounded-xl transition-all text-emerald-500 bg-emerald-500/10 hover:bg-emerald-500/20';
                btnPrivacy.innerHTML = '<i data-lucide="shield-off" width="22" height="22"></i>';
            }
        }

        function renderHeader() {
            const filtered = getFilteredNotes();
            document.getElementById('header-stats').innerText = `${window.state.category} • ${filtered.length} Itens`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = `<span class="text-gray-600">D</span><span class="text-gray-600">S</span><span class="text-gray-600">T</span><span class="text-gray-600">Q</span><span class="text-gray-600">Q</span><span class="text-gray-600">S</span><span class="text-gray-600">S</span>`;
            
            for (let i = 1; i <= 31; i++) {
                const isToday = i === 6;
                const hasNote = i === 1 || i === 4;
                grid.innerHTML += `
                    <div class="relative flex justify-center items-center h-6">
                        <span class="w-6 h-6 flex items-center justify-center rounded-full ${isToday ? 'bg-[#3E5A7A] text-white shadow-lg' : 'text-gray-400'}">${i}</span>
                        ${hasNote && !isToday ? '<div class="absolute bottom-0 w-1 h-1 bg-emerald-500 rounded-full"></div>' : ''}
                    </div>
                `;
            }
        }

        function renderNotebooks() {
            const container = document.getElementById('notebooks-container');
            const filtered = getFilteredNotes();
            
            // Agrupar por categorias
            const grouped = filtered.reduce((acc, note) => {
                if(!acc[note.category]) acc[note.category] = [];
                acc[note.category].push(note);
                return acc;
            }, {});

            // Garantir que a categoria ativa tenha uma prateleira, mesmo vazia (se não estivermos a pesquisar)
            if (window.state.search === '') {
                if (window.state.category !== 'Todas' && !grouped[window.state.category]) {
                    grouped[window.state.category] = [];
                }
                if (window.state.category === 'Todas' && Object.keys(grouped).length === 0) {
                    grouped['Geral'] = []; // Prateleira default
                }
            }

            if (Object.keys(grouped).length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-600 mt-20">
                        <i data-lucide="search-x" width="64" height="64" class="mb-4 opacity-50"></i>
                        <p class="text-lg font-serif">Nenhuma caderneta encontrada.</p>
                    </div>`;
                return;
            }

            let html = '';
            
            for (const [categoryName, notes] of Object.entries(grouped)) {
                const shelfId = `shelf-${categoryName.replace(/\s+/g, '-')}`;
                
                html += `
                <div class="mb-14 relative w-full">
                    <div class="flex items-center justify-between px-12 mb-6 border-l-4 border-[#3E5A7A] ml-12">
                        <h2 class="text-2xl font-serif text-white tracking-wide">${categoryName}</h2>
                        <span class="text-slate-600 text-xs font-bold tracking-widest uppercase">${notes.length} Cadernetas</span>
                    </div>
                    
                    <div class="group relative w-full">
                        <!-- Seta Esquerda -->
                        <button onclick="window.scrollShelf('${shelfId}', -1)" class="absolute left-0 top-1/2 -translate-y-1/2 z-30 bg-black/80 text-white p-4 rounded-r-xl opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md cursor-pointer hover:bg-[#3E5A7A]">
                            <i data-lucide="chevron-left" width="24" height="24"></i>
                        </button>

                        <!-- Contentor da Prateleira (Scroll Horizontal) -->
                        <div id="${shelfId}" class="flex gap-10 overflow-x-auto snap-x snap-mandatory px-12 pb-8 hide-scrollbar scroll-smooth">
                `;

                notes.forEach(note => {
                    const totalPages = note.pages ? note.pages.length : 1;
                    const content = (note.pages && note.pages[note.currentPage]) ? note.pages[note.currentPage] : '';
                    const spiralsHtml = Array(20).fill().map(() => `<div class="h-2 w-full bg-gradient-to-b from-gray-300 via-white to-gray-500 rounded-full border border-gray-600 shadow-md"></div>`).join('');

                    // O Wrapper agora tem snap-start para alinhar certinho no scroll
                    html += `<div class="relative w-80 h-[460px] flex-shrink-0 transition-transform duration-300 hover:scale-[1.02] snap-start">`;
                    
                    if (!note.isOpen) {
                        html += `
                                <div class="absolute -left-3 top-0 bottom-0 w-6 flex flex-col justify-evenly py-4 z-20 pointer-events-none">${spiralsHtml}</div>
                                
                                <div onclick="window.openNote('${note.id}')" class="w-full h-full ${note.color} rounded-r-2xl shadow-2xl border-l-2 border-black/30 cursor-pointer relative overflow-hidden flex justify-end group/card">
                                    <div class="absolute left-[12%] top-20 w-5 h-40 bg-amber-200 rounded-full shadow-[4px_4px_10px_rgba(0,0,0,0.4)] border border-black/20 flex flex-col items-center">
                                        <div class="w-full h-6 bg-gradient-to-b from-gray-300 to-gray-400 rounded-t-full border-b border-gray-500"></div>
                                    </div>

                                    <div class="w-[65%] h-full bg-[#fdfbf7] shadow-[-10px_0_20px_rgba(0,0,0,0.15)] flex flex-col items-center py-10 px-4 text-center z-10 transition-colors group-hover/card:bg-white text-slate-800">
                                        <i data-lucide="leaf" class="text-emerald-700 mb-6 opacity-80" width="36" height="36" stroke-width="1.5"></i>
                                        <h2 class="text-xl font-serif font-bold uppercase tracking-widest leading-snug border-b-2 border-slate-200 pb-3 w-full mb-3">${note.title}</h2>
                                        <p class="text-slate-500 text-[11px] uppercase tracking-widest font-semibold">${note.subtitle}</p>
                                        <div class="mt-auto w-full">
                                            <p class="text-slate-400 text-[9px] mb-3 uppercase">Criado em ${note.date}</p>
                                            <div class="flex flex-wrap justify-center gap-1.5">
                                                ${(note.tags||[]).map(tag => `<span class="text-[9px] bg-slate-100 text-slate-600 px-2 py-1 rounded border border-slate-200 uppercase tracking-wider">#${tag}</span>`).join('')}
                                            </div>
                                        </div>
                                        <i data-lucide="pen-tool" class="absolute bottom-5 text-slate-300" width="14" height="14"></i>
                                    </div>
                                </div>
                        `;
                    } else {
                        let interiorContent = '';
                        
                        if (note.isEditing) {
                            const tagsString = (note.tags || []).join(', ');
                            interiorContent = `
                                <div class="flex-1 p-6 flex flex-col gap-4 overflow-y-auto text-slate-700 bg-[#fdfbf7] custom-scroll">
                                    <h3 class="text-sm font-bold uppercase tracking-widest border-b border-slate-200 pb-2">Detalhes da Capa</h3>
                                    
                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Título</label>
                                        <input type="text" value="${note.title}" onblur="window.updateNoteMeta('${note.id}', 'title', this.value)" class="w-full bg-white border border-slate-300 rounded p-2 text-sm outline-none focus:border-[#3E5A7A]">
                                    </div>
                                    
                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Subtítulo</label>
                                        <input type="text" value="${note.subtitle}" onblur="window.updateNoteMeta('${note.id}', 'subtitle', this.value)" class="w-full bg-white border border-slate-300 rounded p-2 text-sm outline-none focus:border-[#3E5A7A]">
                                    </div>

                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Categoria</label>
                                        <select onchange="window.updateNoteMeta('${note.id}', 'category', this.value)" class="w-full bg-white border border-slate-300 rounded p-2 text-sm outline-none focus:border-[#3E5A7A]">
                                            <option value="Geral" ${note.category === 'Geral' ? 'selected' : ''}>Geral</option>
                                            <option value="Senhas" ${note.category === 'Senhas' ? 'selected' : ''}>Senhas</option>
                                            <option value="Códigos" ${note.category === 'Códigos' ? 'selected' : ''}>Códigos</option>
                                        </select>
                                    </div>

                                    <div class="flex flex-col gap-1">
                                        <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Tags (separadas por vírgula)</label>
                                        <input type="text" value="${tagsString}" onblur="window.updateNoteMeta('${note.id}', 'tags', this.value)" placeholder="ex: python, dev, log" class="w-full bg-white border border-slate-300 rounded p-2 text-sm outline-none focus:border-[#3E5A7A]">
                                    </div>

                                    <button onclick="window.toggleEditNote('${note.id}')" class="mt-2 bg-slate-800 text-white font-bold text-xs uppercase tracking-widest py-3 rounded hover:bg-slate-700 transition-colors">Voltar para Páginas</button>
                                </div>
                            `;
                        } else {
                            interiorContent = `
                                <div class="flex-1 relative">
                                    <textarea 
                                        oninput="window.updateNoteData('${note.id}', this.value)"
                                        onblur="window.saveNoteData('${note.id}')"
                                        class="w-full h-full bg-transparent resize-none outline-none p-5 text-slate-800 font-sans leading-[32px] lines-bg ${window.state.privacyMode ? 'blur-md select-none pointer-events-none' : ''}"
                                        style="padding-left: 40px;" spellcheck="false" placeholder="Comece a escrever nesta página em branco..."
                                    >${content}</textarea>
                                    <div class="absolute left-8 top-0 bottom-0 w-px bg-red-300/60 pointer-events-none"></div>
                                </div>
                            `;
                        }

                        html += `
                                <div class="absolute -left-3 top-0 bottom-0 w-6 flex flex-col justify-evenly py-4 z-20 pointer-events-none">${spiralsHtml}</div>
                                
                                <div class="w-full h-full bg-[#fdfbf7] rounded-r-2xl shadow-2xl border-l border-gray-300 flex flex-col">
                                    <div class="flex justify-between items-center p-3 border-b border-red-200 bg-[#fdfbf7] rounded-tr-2xl">
                                        <span class="text-xs font-serif text-gray-500 font-semibold truncate text-slate-800 flex-1 px-1">${note.title}</span>
                                        <div class="flex gap-1.5 items-center">
                                            <button onclick="window.toggleEditNote('${note.id}')" class="p-1.5 bg-slate-100 text-slate-500 hover:bg-slate-200 rounded-md transition-colors" title="Configurações da Capa">
                                                <i data-lucide="settings-2" width="14" height="14"></i>
                                            </button>
                                            <button onclick="window.deleteNotebook('${note.id}')" class="p-1.5 bg-red-50 text-red-500 hover:bg-red-100 rounded-md transition-colors" title="Apagar Caderneta">
                                                <i data-lucide="trash-2" width="14" height="14"></i>
                                            </button>
                                            <button onclick="window.closeNote('${note.id}')" class="text-[10px] bg-slate-200 text-slate-600 hover:bg-slate-300 font-bold px-3 py-1.5 rounded-full uppercase tracking-wider transition-colors ml-1">Fechar</button>
                                        </div>
                                    </div>

                                    ${interiorContent}

                                    <div class="h-12 border-t border-gray-200 flex justify-between items-center px-3 bg-slate-50 rounded-br-2xl text-slate-500">
                                        <div class="flex gap-1 items-center w-1/3">
                                            <button onclick="window.changePage('${note.id}', -1)" ${note.currentPage === 0 || note.isEditing ? 'disabled' : ''} class="p-1.5 hover:bg-slate-200 rounded-md disabled:opacity-30 transition-colors cursor-pointer disabled:cursor-not-allowed">
                                                <i data-lucide="chevron-left" width="16" height="16"></i>
                                            </button>
                                            <button onclick="window.changePage('${note.id}', 1)" ${note.currentPage >= totalPages - 1 || note.isEditing ? 'disabled' : ''} class="p-1.5 hover:bg-slate-200 rounded-md disabled:opacity-30 transition-colors cursor-pointer disabled:cursor-not-allowed">
                                                <i data-lucide="chevron-right" width="16" height="16"></i>
                                            </button>
                                        </div>
                                        <span class="text-[10px] font-bold tracking-widest uppercase text-slate-800 w-1/3 text-center ${note.isEditing ? 'opacity-30' : ''}">Pág ${note.currentPage + 1} / ${totalPages}</span>
                                        <div class="flex gap-1 items-center w-1/3 justify-end">
                                            <button onclick="window.addPage('${note.id}')" ${note.isEditing ? 'disabled' : ''} class="p-1.5 hover:bg-emerald-100 text-emerald-600 rounded-md disabled:opacity-30 transition-colors" title="Adicionar Página">
                                                <i data-lucide="file-plus-2" width="16" height="16"></i>
                                            </button>
                                            <button onclick="window.deletePage('${note.id}')" ${note.isEditing ? 'disabled' : ''} class="p-1.5 hover:bg-red-100 text-red-500 rounded-md disabled:opacity-30 transition-colors" title="Arrancar Página Atual">
                                                <i data-lucide="file-minus-2" width="16" height="16"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                        `;
                    }
                    html += `</div>`; // Fecho do wrapper da note
                });

                // Adiciona o botão "Criar Nova Caderneta" específico para esta prateleira
                html += `
                            <div onclick="window.createNewNote('${categoryName}')" class="w-80 h-[460px] flex-shrink-0 border-2 border-dashed border-white/10 rounded-r-2xl flex flex-col items-center justify-center text-gray-600 hover:bg-white/5 hover:border-white/20 hover:text-gray-400 transition-all cursor-pointer snap-start">
                                <i data-lucide="plus" width="40" height="40" class="mb-4 text-[#3E5A7A]"></i>
                                <span class="text-xs font-bold uppercase tracking-widest text-center px-4">Nova Caderneta<br/><span class="text-[10px] text-gray-600 opacity-60">em ${categoryName}</span></span>
                            </div>
                        </div>

                        <!-- Seta Direita -->
                        <button onclick="window.scrollShelf('${shelfId}', 1)" class="absolute right-0 top-1/2 -translate-y-1/2 z-30 bg-black/80 text-white p-4 rounded-l-xl opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-md cursor-pointer hover:bg-[#3E5A7A]">
                            <i data-lucide="chevron-right" width="24" height="24"></i>
                        </button>
                    </div>
                </div>
                `;
            }

            container.innerHTML = html;
        }

        // --- FUNÇÕES DE INTERAÇÃO (Disponíveis globalmente) ---
        
        window.scrollShelf = (shelfId, direction) => {
            const shelf = document.getElementById(shelfId);
            if (shelf) {
                // 320px (largura do caderno) + 40px (gap)
                const scrollAmount = 360 * direction;
                shelf.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        };

        function getFilteredNotes() {
            return window.state.notebooks.filter(n => {
                const matchCat = window.state.category === 'Todas' || n.category === window.state.category;
                const matchSearch = n.title.toLowerCase().includes(window.state.search.toLowerCase()) || 
                                    (n.tags||[]).some(t => t.toLowerCase().includes(window.state.search.toLowerCase()));
                return matchCat && matchSearch;
            });
        }

        window.setCategory = (cat) => {
            window.state.category = cat;
            window.renderApp();
        };

        window.updateSearch = (val) => {
            window.state.search = val;
            window.renderApp();
        };

        window.togglePrivacy = () => {
            window.state.privacyMode = !window.state.privacyMode;
            if (window.state.privacyMode) {
                // Fecha todos ao ativar privacidade
                window.state.notebooks.forEach(n => {
                    if(n.isOpen) window.saveNoteData(n.id);
                    n.isOpen = false;
                });
            }
            window.renderApp();
        };

        window.openNote = (id) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note && !window.state.privacyMode) {
                note.isOpen = true;
                window.renderApp();
            }
        };

        window.closeNote = (id) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                if(!note.isEditing) window.saveNoteData(id); // Guarda antes de fechar se não estiver nas configurações
                note.isOpen = false;
                note.isEditing = false;
                window.renderApp();
            }
        };

        window.toggleEditNote = (id) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                note.isEditing = !note.isEditing;
                window.renderApp();
            }
        };

        window.updateNoteMeta = async (id, field, value) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note && window.state.userId) {
                if (field === 'tags') {
                    note[field] = value.split(',').map(t => t.trim()).filter(t => t !== '');
                } else {
                    note[field] = value;
                }
                
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'mynotes-app';
                const noteRef = doc(db, 'artifacts', appId, 'users', window.state.userId, 'notebooks', id);
                try {
                    await updateDoc(noteRef, { [field]: note[field] });
                } catch(e) { console.error("Erro a atualizar metadados:", e); }
            }
        };

        window.addPage = (id) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                window.saveNoteData(id); // Guarda a página atual antes de adicionar
                note.pages.push('');
                note.currentPage = note.pages.length - 1;
                window.saveNoteData(id); // Guarda a nova array de páginas
                window.renderApp();
            }
        };

        window.deletePage = (id) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                if (confirm("Tem certeza que deseja arrancar (apagar) esta página?")) {
                    if (note.pages.length > 1) {
                        note.pages.splice(note.currentPage, 1);
                        if (note.currentPage >= note.pages.length) {
                            note.currentPage = note.pages.length - 1;
                        }
                    } else {
                        note.pages[0] = ''; // Limpa a única página existente
                    }
                    window.saveNoteData(id);
                    window.renderApp();
                }
            }
        };

        window.deleteNotebook = async (id) => {
            if (confirm("Tem certeza que deseja DESTRUIR esta caderneta permanentemente? Todos os dados serão perdidos.")) {
                if (window.state.userId) {
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'mynotes-app';
                    const noteRef = doc(db, 'artifacts', appId, 'users', window.state.userId, 'notebooks', id);
                    try {
                        await deleteDoc(noteRef);
                        // O onSnapshot vai cuidar de remover o documento da UI automaticamente
                    } catch(e) { console.error("Erro ao apagar caderneta:", e); }
                }
            }
        };

        window.changePage = (id, direction) => {
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                window.saveNoteData(id); // Guarda a página atual antes de mudar
                const newPage = note.currentPage + direction;
                if (newPage >= 0 && newPage < note.pages.length) {
                    note.currentPage = newPage;
                    window.renderApp();
                }
            }
        };

        window.updateNoteData = (id, text) => {
            // Atualiza localmente sem re-renderizar para escrita suave
            const note = window.state.notebooks.find(n => n.id === id);
            if (note) {
                note.pages[note.currentPage] = text;
            }
        };

        window.saveNoteData = async (id) => {
             const note = window.state.notebooks.find(n => n.id === id);
             if (note && window.state.userId) {
                 const appId = typeof __app_id !== 'undefined' ? __app_id : 'mynotes-app';
                 const noteRef = doc(db, 'artifacts', appId, 'users', window.state.userId, 'notebooks', id);
                 try {
                     await updateDoc(noteRef, {
                         pages: note.pages
                     });
                     console.log("Nota guardada na nuvem!");
                 } catch (e) {
                     console.error("Erro a guardar nota: ", e);
                 }
             }
        }
        
        // Agora aceita a categoria específica em que o botão "Nova Caderneta" foi clicado
        window.createNewNote = async (targetCategory) => {
             if(!window.state.userId) return;
             
             const date = new Date();
             const formattedDate = date.toLocaleDateString('pt-BR');
             
             const newNote = {
                 title: 'Nova Caderneta',
                 subtitle: 'Sem Descrição',
                 date: formattedDate,
                 tags: ['novo'],
                 category: targetCategory || 'Geral', // Usa a prateleira atual
                 color: 'bg-[#5f6368]',
                 pages: ['']
             };
             
             const appId = typeof __app_id !== 'undefined' ? __app_id : 'mynotes-app';
             const notesRef = collection(db, 'artifacts', appId, 'users', window.state.userId, 'notebooks');
             
             try {
                await addDoc(notesRef, newNote);
             } catch (e) {
                 console.error("Erro ao criar nota: ", e);
             }
        }

    </script>
</body>
</html>
